<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>תחנות דלק 98</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #f5f5f5; color: #333;
  -webkit-tap-highlight-color: transparent;
  overscroll-behavior: none;
}

/* ─── Tabs ─── */
.tabs { display: flex; background: #1a1a2e; position: sticky; top: 0; z-index: 100; }
.tab {
  flex: 1; padding: 14px; text-align: center;
  color: #aaa; cursor: pointer;
  border-bottom: 3px solid transparent;
  transition: all .2s; font-size: 14px; font-weight: 500;
  -webkit-user-select: none; user-select: none;
}
.tab.active { color: #fff; border-bottom-color: #e94560; }
.tab:active { background: rgba(255,255,255,.05); }

/* ─── Search ─── */
.search-bar {
  padding: 10px 16px; background: #16213e;
}
.search-box { position: relative; }
.search-box input {
  width: 100%; padding: 10px 14px; padding-right: 36px;
  border: none; border-radius: 8px;
  font-size: 15px; direction: rtl;
  background: rgba(255,255,255,.12); color: #fff;
}
.search-box input::placeholder { color: rgba(255,255,255,.5); }
.search-box input:focus { outline: none; background: rgba(255,255,255,.2); }
.search-icon {
  position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
  color: rgba(255,255,255,.5); font-size: 16px; pointer-events: none;
}

/* ─── Brand Filters ─── */
.brand-filters {
  display: flex; gap: 8px; padding: 10px 16px;
  background: #fff; border-bottom: 1px solid #e0e0e0;
  overflow-x: auto; -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.brand-filters::-webkit-scrollbar { display: none; }
.brand-btn {
  padding: 7px 16px; border: 2px solid #ddd; border-radius: 20px;
  background: #fff; cursor: pointer; font-size: 13px;
  transition: all .2s; white-space: nowrap; flex-shrink: 0;
}
.brand-btn:active { transform: scale(.95); }
.brand-btn.active { border-color: #e94560; background: #fef0f3; color: #e94560; font-weight: 600; }

/* ─── Card List (mobile-first) ─── */
.content { padding: 12px; max-width: 700px; margin: 0 auto; }

.station-card {
  background: #fff; border-radius: 12px;
  padding: 14px 16px; margin-bottom: 10px;
  box-shadow: 0 1px 4px rgba(0,0,0,.06);
  display: flex; align-items: center; gap: 12px;
  transition: box-shadow .2s;
}
.station-card:active { box-shadow: 0 1px 8px rgba(0,0,0,.12); }

.station-rank {
  width: 28px; height: 28px; border-radius: 50%;
  background: #f0f0f0; color: #666;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; flex-shrink: 0;
}

.station-info { flex: 1; min-width: 0; }
.station-name { font-weight: 600; font-size: 15px; margin-bottom: 4px; }
.station-meta { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

.brand-tag {
  display: inline-block; padding: 2px 10px; border-radius: 10px;
  font-size: 11px; font-weight: 600;
}
.brand-דור-אלון { background: #e8f5e9; color: #2e7d32; }
.brand-פז { background: #fff8e1; color: #f9a825; }
.brand-סונול { background: #ffebee; color: #d32f2f; }
.brand-מיקה { background: #f3e5f5; color: #9c27b0; }

.distance { color: #888; font-size: 13px; }

.waze-btn {
  display: flex; align-items: center; justify-content: center;
  width: 44px; height: 44px; border-radius: 50%;
  background: #30b6ff; text-decoration: none;
  flex-shrink: 0; transition: transform .15s;
  overflow: hidden;
}
.waze-btn img { width: 28px; height: 28px; }
.waze-btn:active { transform: scale(.9); }

/* ─── Desktop table ─── */
.station-table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 10px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,.08); display: none; }
.station-table th { background: #1a1a2e; color: #fff; padding: 12px 14px; text-align: right; font-size: 13px; }
.station-table td { padding: 10px 14px; border-bottom: 1px solid #f0f0f0; font-size: 14px; }
.station-table tr:hover { background: #f8f8ff; }
.waze-link {
  display: inline-flex; align-items: center; gap: 6px;
  color: #30b6ff; text-decoration: none; font-weight: 600; font-size: 13px;
}
.waze-link img { width: 20px; height: 20px; }
.waze-link:hover { text-decoration: underline; }

/* ─── Map ─── */
#map { height: calc(100vh - 140px); height: calc(100dvh - 140px); width: 100%; display: none; }

/* ─── User location marker ─── */
.user-location-marker {
  width: 24px; height: 24px; position: relative;
}
.user-location-marker::before {
  content: '';
  position: absolute; top: 0; left: 0;
  width: 24px; height: 24px;
  background: rgba(66, 133, 244, .15);
  border-radius: 50%;
}
.user-location-marker::after {
  content: '';
  position: absolute;
  top: 3px; left: 3px;
  width: 0; height: 0;
  border-left: 9px solid transparent;
  border-right: 9px solid transparent;
  border-bottom: 16px solid #4285f4;
  filter: drop-shadow(0 1px 2px rgba(0,0,0,.3));
  transform: rotate(0deg);
  transform-origin: center bottom;
}

/* ─── Error popup ─── */
.error-popup {
  position: fixed; top: 0; left: 0; right: 0;
  background: #d32f2f; color: #fff;
  padding: 14px 20px; padding-top: max(14px, env(safe-area-inset-top));
  box-shadow: 0 4px 12px rgba(0,0,0,.3); z-index: 9999;
  font-size: 14px; text-align: center;
  animation: slideDown .3s ease;
  display: flex; align-items: center; justify-content: center; gap: 12px;
}
@keyframes slideDown { from { transform: translateY(-100%); } to { transform: translateY(0); } }
.error-popup .close-btn {
  cursor: pointer; font-weight: bold;
  width: 28px; height: 28px; border-radius: 50%;
  background: rgba(255,255,255,.2);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}

.empty-state { text-align: center; padding: 60px 20px; color: #999; }
.empty-state .icon { font-size: 48px; margin-bottom: 12px; }

.locate-btn {
  display: inline-block; margin-top: 16px;
  padding: 12px 28px; border: none; border-radius: 8px;
  background: #e94560; color: #fff;
  font-size: 15px; font-weight: 600; cursor: pointer;
}
.locate-btn:active { transform: scale(.96); }

/* ─── Desktop ─── */
@media (min-width: 768px) {
  .content { padding: 20px; max-width: 900px; }
  .station-card { display: none; }
  .station-table { display: table; }
  #map { height: calc(100vh - 148px); }
}
</style>
</head>
<body>

<div class="tabs">
  <div class="tab active" data-view="table">רשימה</div>
  <div class="tab" data-view="map">מפה</div>
</div>

<div class="search-bar">
  <div class="search-box">
    <span class="search-icon">&#128269;</span>
    <input type="text" id="searchInput" placeholder="חיפוש תחנה או עיר...">
  </div>
</div>

<div class="brand-filters">
  <button class="brand-btn active" data-brand="all">הכל</button>
  <button class="brand-btn" data-brand="פז">פז</button>
  <button class="brand-btn" data-brand="דור אלון">דור אלון</button>
  <button class="brand-btn" data-brand="סונול">סונול</button>
  <button class="brand-btn" data-brand="מיקה">מיקה</button>
</div>

<div id="tableView" class="content">
  <div class="empty-state" id="locatePrompt">
    <div class="icon">&#128267;</div>
    <div>לחץ כדי לאתר תחנות קרובות</div>
    <button class="locate-btn" id="locateBtn">אתר את מיקומי</button>
  </div>
</div>

<div id="map"></div>

<!-- Waze icon as inline SVG data URI -->
<script>
const WAZE_ICON_WHITE = 'data:image/svg+xml,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="white"><path d="M20.54 6.63c-1.19-4.28-5.56-7.09-9.95-6.4C6.72.91 3.42 3.72 2.5 7.5c-.61 2.52-.27 5.04.68 7.2-.49.76-.68 1.63-.49 2.55.22 1.03.93 1.88 1.89 2.3.42.18.85.27 1.28.27.47 0 .93-.12 1.36-.35 1.38.76 2.9 1.15 4.43 1.15.44 0 .88-.03 1.31-.09 3.34-.49 6.2-2.81 7.32-5.96.58-1.62.72-3.37.37-5.05-.05-.22-.09-.43-.15-.64l-.06-.25zM7.5 12.5c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zm5.5 3.5c-1.24 0-2.38-.54-3.16-1.42-.2-.23-.18-.58.05-.78.23-.2.58-.18.78.05.56.63 1.37 1 2.22 1.05.9.01 1.77-.35 2.36-1.02.22-.24.57-.26.8-.04.24.22.26.57.04.8-.82.89-1.96 1.38-3.17 1.38l-.03-.02h.11zm1-3.5c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/></svg>');
const WAZE_ICON_BLUE = 'data:image/svg+xml,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%2330b6ff"><path d="M20.54 6.63c-1.19-4.28-5.56-7.09-9.95-6.4C6.72.91 3.42 3.72 2.5 7.5c-.61 2.52-.27 5.04.68 7.2-.49.76-.68 1.63-.49 2.55.22 1.03.93 1.88 1.89 2.3.42.18.85.27 1.28.27.47 0 .93-.12 1.36-.35 1.38.76 2.9 1.15 4.43 1.15.44 0 .88-.03 1.31-.09 3.34-.49 6.2-2.81 7.32-5.96.58-1.62.72-3.37.37-5.05-.05-.22-.09-.43-.15-.64l-.06-.25zM7.5 12.5c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zm5.5 3.5c-1.24 0-2.38-.54-3.16-1.42-.2-.23-.18-.58.05-.78.23-.2.58-.18.78.05.56.63 1.37 1 2.22 1.05.9.01 1.77-.35 2.36-1.02.22-.24.57-.26.8-.04.24.22.26.57.04.8-.82.89-1.96 1.38-3.17 1.38l-.03-.02h.11zm1-3.5c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/></svg>');
</script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
let stations = [];
let userLat = null, userLon = null;
let currentView = 'table';
let currentBrand = 'all';
let map = null, markers = [], userMarker = null;

// Remap brand names for display
function displayBrand(brand) {
  if (brand === 'דורלון') return 'דור אלון';
  return brand;
}

function brandClass(brand) {
  if (brand === 'דורלון') return 'דור-אלון';
  return brand;
}

fetch('stations.json')
  .then(r => r.json())
  .then(data => {
    stations = data.filter(s => s.coordinates);
  });

// requestLocation is handled inline in the locate button click handler
// to ensure Safari iOS recognizes the user gesture context

function showError(msg) {
  const div = document.createElement('div');
  div.className = 'error-popup';
  div.innerHTML = `<span class="close-btn" onclick="this.parentElement.remove()">&#10005;</span><span>${msg}</span>`;
  document.body.appendChild(div);
  setTimeout(() => div.remove(), 6000);
}

function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function getFiltered() {
  const query = document.getElementById('searchInput').value.trim().toLowerCase();
  let list = [...stations];
  if (currentBrand !== 'all') list = list.filter(s => {
    if (currentBrand === 'דור אלון') return s.brand === 'דורלון';
    return s.brand === currentBrand;
  });
  if (query) list = list.filter(s =>
    s.name.toLowerCase().includes(query) ||
    displayBrand(s.brand).toLowerCase().includes(query) ||
    s.brand.toLowerCase().includes(query)
  );
  if (userLat !== null) {
    list.forEach(s => { s._dist = haversine(userLat, userLon, s.coordinates.lat, s.coordinates.lon); });
    list.sort((a, b) => a._dist - b._dist);
  }
  return list;
}

function formatDist(km) {
  if (km < 1) return `${Math.round(km * 1000)} מ'`;
  return `${km.toFixed(1)} ק"מ`;
}

function wazeUrl(lat, lon) {
  return `https://waze.com/ul?ll=${lat},${lon}&navigate=yes`;
}

function render() {
  const list = getFiltered();
  if (currentView === 'table') renderTable(list);
  if (currentView === 'map') renderMap(list);
}

function renderTable(list) {
  const shown = list.slice(0, userLat !== null ? 10 : list.length);
  const container = document.getElementById('tableView');

  if (shown.length === 0) {
    container.innerHTML = '<div class="empty-state"><div class="icon">&#128531;</div>לא נמצאו תחנות</div>';
    return;
  }

  // Mobile cards
  let cards = '';
  shown.forEach((s, i) => {
    const brand = displayBrand(s.brand);
    cards += `
    <div class="station-card">
      <div class="station-rank">${i + 1}</div>
      <div class="station-info">
        <div class="station-name">${s.name}</div>
        <div class="station-meta">
          <span class="brand-tag brand-${brandClass(s.brand)}">${brand}</span>
          ${s._dist != null ? `<span class="distance">${formatDist(s._dist)}</span>` : ''}
        </div>
      </div>
      <a class="waze-btn" href="${wazeUrl(s.coordinates.lat, s.coordinates.lon)}" target="_blank" title="נווט ב-Waze"><img src="${WAZE_ICON_WHITE}" alt="Waze"></a>
    </div>`;
  });

  // Desktop table
  let table = `<table class="station-table">
    <thead><tr>
      <th>#</th><th>תחנה</th><th>חברה</th>
      ${userLat !== null ? '<th>מרחק</th>' : ''}
      <th>ניווט</th>
    </tr></thead><tbody>`;
  shown.forEach((s, i) => {
    const brand = displayBrand(s.brand);
    table += `<tr>
      <td>${i + 1}</td>
      <td>${s.name}</td>
      <td><span class="brand-tag brand-${brandClass(s.brand)}">${brand}</span></td>
      ${userLat !== null ? `<td class="distance">${formatDist(s._dist)}</td>` : ''}
      <td><a class="waze-link" href="${wazeUrl(s.coordinates.lat, s.coordinates.lon)}" target="_blank"><img src="${WAZE_ICON_BLUE}" alt="Waze"> Waze</a></td>
    </tr>`;
  });
  table += '</tbody></table>';

  container.innerHTML = cards + table;
}

// Map
const brandColors = { 'פז': '#f9a825', 'דורלון': '#2e7d32', 'סונול': '#d32f2f', 'מיקה': '#d500f9' };

function renderMap(list) {
  const mapEl = document.getElementById('map');
  mapEl.style.display = 'block';
  document.getElementById('tableView').style.display = 'none';

  if (!map) {
    const center = userLat !== null ? [userLat, userLon] : [31.8, 34.8];
    map = L.map('map', { zoomControl: false }).setView(center, userLat !== null ? 12 : 8);
    L.control.zoom({ position: 'bottomright' }).addTo(map);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap'
    }).addTo(map);

    if (userLat !== null) {
      const arrowIcon = L.divIcon({
        className: '',
        html: `<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
          <circle cx="16" cy="16" r="15" fill="rgba(66,133,244,.15)" stroke="rgba(66,133,244,.3)" stroke-width="1"/>
          <path d="M16 6 L22 22 L16 18 L10 22 Z" fill="#4285f4" stroke="#fff" stroke-width="1.5" stroke-linejoin="round"/>
        </svg>`,
        iconSize: [32, 32],
        iconAnchor: [16, 16],
      });
      userMarker = L.marker([userLat, userLon], { icon: arrowIcon, zIndexOffset: 1000 })
        .addTo(map).bindPopup('המיקום שלך');
    }
  }

  markers.forEach(m => map.removeLayer(m));
  markers = [];

  list.forEach(s => {
    const color = brandColors[s.brand] || '#666';
    const brand = displayBrand(s.brand);
    const marker = L.circleMarker([s.coordinates.lat, s.coordinates.lon], {
      radius: 8, fillColor: color, fillOpacity: .9, color: '#fff', weight: 2
    }).addTo(map);

    const distStr = s._dist ? `<br><span style="color:#888">${formatDist(s._dist)}</span>` : '';
    marker.bindPopup(`
      <div style="text-align:right;font-size:14px;min-width:140px">
        <b>${s.name}</b><br>
        <span class="brand-tag brand-${brandClass(s.brand)}" style="display:inline-block;padding:2px 8px;border-radius:8px;font-size:11px;margin:4px 0">${brand}</span>
        ${distStr}
        <br><a href="${wazeUrl(s.coordinates.lat, s.coordinates.lon)}" target="_blank"
          style="display:inline-flex;align-items:center;gap:4px;margin-top:6px;padding:6px 14px;background:#30b6ff;color:#fff;border-radius:6px;text-decoration:none;font-size:13px">
          <img src="${WAZE_ICON_WHITE}" width="16" height="16" alt=""> נווט ב-Waze</a>
      </div>
    `);
    markers.push(marker);
  });

  if (userLat !== null) {
    map.setView([userLat, userLon], 13);
  } else if (markers.length > 0) {
    const group = L.featureGroup(markers);
    map.fitBounds(group.getBounds().pad(0.1));
  }

  setTimeout(() => map.invalidateSize(), 100);
}

// Tabs
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentView = tab.dataset.view;
    if (currentView === 'table') {
      document.getElementById('map').style.display = 'none';
      document.getElementById('tableView').style.display = 'block';
    }
    render();
  });
});

// Brand filters
document.querySelectorAll('.brand-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.brand-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentBrand = btn.dataset.brand;
    render();
  });
});

// Search
document.getElementById('searchInput').addEventListener('input', () => render());

// Locate button — Safari iOS requires geolocation call directly in the click handler
document.getElementById('locateBtn').addEventListener('click', function() {
  const prompt = document.getElementById('locatePrompt');
  if (prompt) prompt.innerHTML = '<div class="icon">&#128267;</div>מאתר את מיקומך...';

  if (!navigator.geolocation) {
    showError('הדפדפן לא תומך בשירותי מיקום');
    render();
    return;
  }

  navigator.geolocation.getCurrentPosition(
    function(pos) {
      userLat = pos.coords.latitude;
      userLon = pos.coords.longitude;
      render();
    },
    function(err) {
      showError('שגיאת מיקום (' + err.code + '): ' + (err.code === 1 ? 'הרשאה נדחתה' : err.code === 2 ? 'לא זמין' : 'זמן תם'));
      render();
    },
    { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
  );
});
</script>
</body>
</html>
